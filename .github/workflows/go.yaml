name: Go
on: 
  push:
  schedule:
    - cron: '0 20 * * 1'
jobs:
  test:
    strategy:
      matrix:
        go:
          - 1.25
          - 1.26
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

    - name: Build & Test
      run: |
        make run
